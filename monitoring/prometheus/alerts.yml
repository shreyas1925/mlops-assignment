groups:
  - name: heart-disease-api-alerts
    rules:
      - alert: HighPredictionLatencyP95
        expr: histogram_quantile(0.95, sum(rate(prediction_latency_seconds_bucket[2m])) by (le)) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High /predict latency"
          description: "95th percentile /predict latency is above 500ms."

      - alert: PredictEndpointNotReceivingTraffic
        expr: sum(rate(api_requests_total{endpoint="/predict"}[5m])) < 0.001
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "No /predict traffic"
          description: "Predict endpoint has near-zero traffic for 10 minutes."

      - alert: ApiTrafficSpike
        expr: sum(rate(api_requests_total[1m])) > 5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Traffic spike on heart-disease-api"
          description: "API is receiving more than 5 requests/second sustained over 30 seconds. Likely a load test or unusual client behaviour."
